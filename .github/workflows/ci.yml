name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test

  test-cljs:
    name: shadow-cljs node-test (real ClojureScript, not just .cljc-named)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.gitlibs
            ~/.m2
          key: ${{ runner.os }}-cljs-${{ hashFiles('package.json', 'deps.edn') }}

      - run: npm install
      # gen-shadow-cljs-edn.bb resolves `clojure -Spath` (the SAME git/sha
      # deps.edn dependencies `clojure -M:test` uses) into shadow-cljs.edn's
      # :source-paths, so this always tests against the exact pinned
      # versions -- never a hand-duplicated, driftable path list.
      - run: npm run test:cljs
